kind = "web"
previewPath = "/"
title = "FLONE"
version = "1.0.0"
id = "artifacts/flone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19858

[services.development]
run = "pnpm --filter @workspace/flone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flone", "run", "build" ]
publicDir = "artifacts/flone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19858"
BASE_PATH = "/"
